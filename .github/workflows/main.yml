name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Generate the native Android project
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap copy android

      - name: Add camera permission to the manifest
        run: sed -i 's#<uses-permission android:name="android.permission.INTERNET" />#<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />#' android/app/src/main/AndroidManifest.xml

      - name: Apply custom MainActivity (grants camera permission to the WebView)
        run: cp MainActivity.java android/app/src/main/java/com/tarelka/app/MainActivity.java

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tarelka-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
